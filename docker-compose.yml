services:
  storage-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage
    ports:
      - "5442:5432"
    volumes:
      - storage-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d storage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  data-storage-service:
    build: .
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://storage-db:5432/storage_db
      DB_USERNAME: storage
      DB_PASSWORD: storage
      JWT_SECRET: ${JWT_SECRET:-changeme-replace-in-production-256bit-secret-key!!}
    depends_on:
      storage-db:
        condition: service_healthy

volumes:
  storage-db-data:
