spring:
  application:
    name: data-storage-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5442/storage_db}
    username: ${DB_USERNAME:storage}
    password: ${DB_PASSWORD:storage}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET:changeme-replace-in-production-256bit-secret-key!!}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
